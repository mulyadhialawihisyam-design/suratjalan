<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOG SURAT JALAN - TERMINAL SYSTEM v1.0</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Font Monospace untuk feel CMD -->
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Fira Code', monospace; }
    /* Efek Glow Neon Khas Terminal Retro */
    .neon-border { box-shadow: 0 0 10px rgba(6, 182, 212, 0.2); }
    .neon-text-glow { text-shadow: 0 0 8px rgba(6, 182, 212, 0.5); }
    .neon-btn-glow:hover { box-shadow: 0 0 15px rgba(6, 182, 212, 0.6); }
  </style>
</head>
<body class="bg-black min-h-screen text-cyan-400 p-4 md:p-8 selection:bg-cyan-500 selection:text-black">

  <div class="max-w-5xl mx-auto">
    <!-- Header Style Prompt CMD -->
    <header class="mb-8 border-b border-cyan-900 pb-4">
      <div class="flex items-center text-xs text-gray-500 mb-1">
        <span>SYS.LOG_WMS // GENERATION_ACTIVE</span>
      </div>
      <h1 class="text-2xl md:text-3xl font-bold tracking-wider neon-text-glow text-cyan-400">
        &gt;_ LOG_SURAT_JALAN.EXE
      </h1>
    </header>

    <!-- Navigasi Menu / Tab -->
    <div class="flex space-x-2 mb-6 text-sm">
      <button id="tab-ehub" type="button" onclick="switchMenu('EHUB')" class="px-5 py-2 font-bold uppercase tracking-widest border border-cyan-400 bg-cyan-950 text-cyan-400 focus:outline-none transition-all duration-200 cursor-pointer">
        [ EHUB ]
      </button>
      <button id="tab-topng" type="button" onclick="switchMenu('TO_PNG')" class="px-5 py-2 font-bold uppercase tracking-widest border border-cyan-900 bg-transparent text-gray-500 hover:text-cyan-400 hover:border-cyan-700 focus:outline-none transition-all duration-200 cursor-pointer">
        [ TO_PNG ]
      </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- FORM INPUT -->
      <div class="lg:col-span-1 bg-black p-6 border border-cyan-800 neon-border">
        <div class="text-xs text-cyan-500 uppercase tracking-widest mb-4 flex justify-between">
          <span>[ INPUT_CONSOLE ]</span>
          <span id="current-menu-badge" class="text-cyan-400 animate-pulse">EHUB_MODE</span>
        </div>
        
        <form id="do-form" onsubmit="handleSubmit(event)" class="space-y-4 text-sm">
          <div>
            <label class="block text-xs text-gray-400 uppercase mb-1">&gt; NOMOR DO :</label>
            <input type="text" id="nomor_do" class="w-full bg-gray-950 border border-cyan-900 text-cyan-300 px-3 py-2 rounded-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none transition" placeholder="ENTER DO NUMBER..." required>
          </div>

          <div>
            <label class="block text-xs text-gray-400 uppercase mb-1">&gt; EKSPEDISI / DRIVER :</label>
            <input type="text" id="ekspedisi" class="w-full bg-gray-950 border border-cyan-900 text-cyan-300 px-3 py-2 rounded-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none transition" placeholder="ENTER CARRIER NAME..." required>
          </div>

          <div>
            <label class="block text-xs text-gray-400 uppercase mb-1">&gt; KETERANGAN :</label>
            <textarea id="keterangan" rows="3" class="w-full bg-gray-950 border border-cyan-900 text-cyan-300 px-3 py-2 rounded-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none transition text-xs" placeholder="ADDITIONAL NOTES (OPTIONAL)..."></textarea>
          </div>

          <div>
            <label class="block text-xs text-gray-400 uppercase mb-1">&gt; ATTACH_PHOTOS (MAX 6) :</label>
            <input type="file" id="photos" accept="image/*" multiple onchange="handleFileSelect(event)" class="w-full text-xs text-gray-500 file:mr-4 file:py-1.5 file:px-3 file:border file:border-cyan-800 file:bg-cyan-950 file:text-cyan-400 file:cursor-pointer hover:file:bg-cyan-900">
          </div>

          <!-- Preview File Gambar -->
          <div id="image-preview" class="grid grid-cols-3 gap-2 pt-2"></div>

          <button type="submit" id="btn-submit" class="w-full bg-cyan-950 border border-cyan-400 text-cyan-400 font-bold py-2.5 px-4 tracking-widest transition-all duration-200 neon-btn-glow active:bg-cyan-400 active:text-black cursor-pointer">
            EXECUTE_SAVE
          </button>
        </form>
      </div>

      <!-- HISTORY / TABEL DATA -->
      <div class="lg:col-span-2 bg-black p-6 border border-cyan-800 neon-border">
        <div class="flex justify-between items-center mb-4">
          <div class="text-xs text-cyan-500 uppercase tracking-widest">
            <span>[ SYSTEM_DATABASE_OUTPUT ]</span>
          </div>
          <button type="button" onclick="fetchData()" class="text-xs text-cyan-400 hover:text-white font-medium border border-cyan-900 px-2 py-1 bg-gray-950 hover:border-cyan-500 transition cursor-pointer">
            REFRESH_SYS()
          </button>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse text-xs">
            <thead>
              <tr class="bg-gray-950 text-gray-400 border-b border-cyan-800">
                <th class="py-3 px-3 font-semibold tracking-wider">TIMESTAMP / DO_NO</th>
                <th class="py-3 px-3 font-semibold tracking-wider">CARRIER</th>
                <th class="py-3 px-3 font-semibold tracking-wider">REMARKS</th>
                <th class="py-3 px-3 font-semibold tracking-wider">ATTACHMENTS</th>
              </tr>
            </thead>
            <tbody id="data-table-body" class="divide-y divide-cyan-950 text-cyan-300">
              <tr>
                <td colspan="4" class="text-center py-8 text-gray-600">INITIALIZING DATA FETCH...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- TEMPEL URL WEB APP GAS LO YANG SUDAH DIDEPLOY DI SINI ---
    const WEB_APP_URL = "PASANG_URL_EXEC_WEB_APP_GAS_DI_SINI";

    let currentMenu = "EHUB";
    let selectedPhotosBase64 = [];

    // Ganti Tab Menu (EHUB / TO_PNG)
    function switchMenu(menu) {
      currentMenu = menu;
      
      const tabEhub = document.getElementById('tab-ehub');
      const tabToPng = document.getElementById('tab-topng');
      const badge = document.getElementById('current-menu-badge');

      if (menu === 'EHUB') {
        tabEhub.className = "px-5 py-2 font-bold uppercase tracking-widest border border-cyan-400 bg-cyan-950 text-cyan-400 focus:outline-none transition-all duration-200 cursor-pointer";
        tabToPng.className = "px-5 py-2 font-bold uppercase tracking-widest border border-cyan-900 bg-transparent text-gray-500 hover:text-cyan-400 hover:border-cyan-700 focus:outline-none transition-all duration-200 cursor-pointer";
      } else {
        tabToPng.className = "px-5 py-2 font-bold uppercase tracking-widest border border-cyan-400 bg-cyan-950 text-cyan-400 focus:outline-none transition-all duration-200 cursor-pointer";
        tabEhub.className = "px-5 py-2 font-bold uppercase tracking-widest border border-cyan-900 bg-transparent text-gray-500 hover:text-cyan-400 hover:border-cyan-700 focus:outline-none transition-all duration-200 cursor-pointer";
      }

      badge.textContent = menu + "_MODE";
      fetchData();
    }

    // Memproses Inputan File Gambar ke Base64
    function handleFileSelect(event) {
      const files = event.target.files;
      const previewContainer = document.getElementById('image-preview');
      previewContainer.innerHTML = '';
      selectedPhotosBase64 = [];

      if (files.length > 6) {
        alert("CRITICAL ERROR: MAXIMUM 6 PHOTOS ALLOWED!");
        event.target.value = '';
        return;
      }

      Array.from(files).forEach((file) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const base64String = e.target.result;
          selectedPhotosBase64.push({
            base64: base64String,
            type: file.type
          });

          const img = document.createElement('img');
          img.src = base64String;
          img.className = "w-full h-12 object-cover border border-cyan-900 shadow-sm filter contrast-125";
          previewContainer.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
    }

    // Ambil Data dari Sheet (doGet)
    function fetchData() {
      const tbody = document.getElementById('data-table-body');
      tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-cyan-600 animate-pulse">LOADING_${currentMenu}_RECORDS...</td></tr>`;

      if (!WEB_APP_URL || WEB_APP_URL === "PASANG_URL_EXEC_WEB_APP_GAS_DI_SINI") {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-amber-500 font-medium">⚠️ WEB_APP_URL_NOT_CONFIGURED!</td></tr>`;
        return;
      }

      fetch(`${WEB_APP_URL}?menu=${currentMenu}`)
        .then(res => res.json())
        .then(response => {
          if (response.success) {
            if (!response.data || response.data.length === 0) {
              tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-gray-600">NO RECORDS FOUND.</td></tr>`;
              return;
            }

            tbody.innerHTML = response.data.map(item => {
              // Ambil kunci object dinisialisasi secara dinamis agar aman meskipun ada spasi/perbedaan huruf kapital
              const keys = Object.keys(item);
              const timestamp = item[keys[0]] || '-';
              const nomorDo = item[keys[1]] || '-';
              const ekspedisi = item[keys[2]] || '-';
              const keterangan = item[keys[3]] || '-';

              // Loop kolom foto index 4 sampai 9 di baris sheet kamu
              let photoHtml = '';
              let photoIndex = 1;
              for (let i = 4; i <= 9; i++) {
                if (keys[i] && item[keys[i]]) {
                  photoHtml += `<a href="${item[keys[i]]}" target="_blank" class="inline-block border border-cyan-800 bg-cyan-950/50 text-cyan-400 text-[10px] px-1.5 py-0.5 hover:bg-cyan-400 hover:text-black transition mr-1 mb-1">[IMG_${photoIndex}]</a>`;
                  photoIndex++;
                }
              }

              return `
                <tr class="hover:bg-cyan-950/20 transition-all">
                  <td class="py-3 px-3">
                    <span class="text-[10px] text-gray-600 block">${timestamp}</span>
                    <span class="font-bold text-cyan-400">${nomorDo}</span>
                  </td>
                  <td class="py-3 px-3 text-cyan-200 font-medium">${ekspedisi}</td>
                  <td class="py-3 px-3 text-gray-400 max-w-[150px] truncate" title="${keterangan}">${keterangan}</td>
                  <td class="py-3 px-3">${photoHtml || '<span class="text-gray-700">-</span>'}</td>
                </tr>
              `;
            }).join('');
          } else {
            tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-red-500">ERROR: ${response.message}</td></tr>`;
          }
        })
        .catch(err => {
          tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-red-500">NET::CONNECTION_FAILED</td></tr>`;
        });
    }

    // Simpan Form ke Web App GAS (doPost)
    function handleSubmit(event) {
      event.preventDefault();
      
      const btnSubmit = document.getElementById('btn-submit');
      const nomorDoInput = document.getElementById('nomor_do');
      const ekspedisiInput = document.getElementById('ekspedisi');
      const keteranganInput = document.getElementById('keterangan');
      const fileInput = document.getElementById('photos');

      btnSubmit.disabled = true;
      btnSubmit.innerText = "SAVING_DATA...";
      btnSubmit.className = "w-full bg-gray-950 border border-gray-700 text-gray-600 font-bold py-2.5 px-4 tracking-widest cursor-not-allowed";

      const payload = {
        menu: currentMenu,
        nomor_do: nomorDoInput.value,
        ekspedisi: ekspedisiInput.value,
        keterangan: keteranganInput.value,
        photos: selectedPhotosBase64
      };

      fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(response => {
        if (response.success) {
          alert("TRANSACTION SUCCESSFUL: RECORD ARCHIVED.");
          nomorDoInput.value = '';
          ekspedisiInput.value = '';
          keteranganInput.value = '';
          fileInput.value = '';
          document.getElementById('image-preview').innerHTML = '';
          selectedPhotosBase64 = [];
          
          fetchData();
        } else {
          alert("WRITE_ERROR: " + response.message);
        }
      })
      .catch(err => {
        alert("FATAL NETWORK ERROR / CORS HEADER MISSING ON GAS.");
      })
      .finally(() => {
        btnSubmit.disabled = false;
        btnSubmit.innerText = "EXECUTE_SAVE";
        btnSubmit.className = "w-full bg-cyan-950 border border-cyan-400 text-cyan-400 font-bold py-2.5 px-4 tracking-widest transition-all duration-200 neon-btn-glow active:bg-cyan-400 active:text-black cursor-pointer";
      });
    }

    // Jalankan render data otomatis pas pertama dibuka
    window.onload = function() {
      fetchData();
    };
  </script>
</body>
</html>
